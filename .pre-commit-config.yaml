repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black

        args: ["--config=./backend/pyproject.toml"]
  - repo: https://github.com/PyCQA/isort
    rev: 7.0.0
    hooks:
      - id: isort
        name: isort (python)
        args: ["--settings-path=./backend/pyproject.toml"]
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: ["--config=./backend/pyproject.toml"]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: '\.(js|jsx|ts|tsx|css|html|json|md)$'
        args: ["--config=./frontend/.prettierrc.json"]
        exclude: 'frontend/node_modules|frontend/dist' # Excluir carpetas generadas
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.0.0
    hooks:
      - id: eslint
        files: '\.(js|jsx|ts|tsx)$'
        args: ["--config=./frontend/.eslintrc.json", "--ignore-path=./frontend/.eslintignore"]
        exclude: 'frontend/node_modules|frontend/dist' # Excluir carpetas generadas
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        types: [python]
        pass_filenames: false
      - id: jest
        name: jest
        entry: npm test
        language: system
        types: [javascript]
        files: 'frontend/.*\.js$'
        pass_filenames: false
        always_run: true
        args: [--config=./frontend/jest.config.js]
