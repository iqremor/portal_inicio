{% extends 'admin/master.html' %} {% block body %}
<h1>Gestión de Intentos de Examen</h1>
<p class="lead">
  Desde aquí puede reactivar los intentos para un estudiante específico en una
  materia determinada.
</p>

<div class="row">
  <div class="col-md-12">
    <div class="card card-body shadow-sm">
      <div class="row">
        <div class="col-md-5">
          <div class="form-group">
            <label for="grade-select"
              ><strong>1. Filtrar por Grado:</strong></label
            >
            <select id="grade-select" class="form-control">
              <option value="">Seleccione un grado</option>
              <option value="6">Sexto</option>
              <option value="7">Séptimo</option>
              <option value="8">Octavo</option>
              <option value="9">Noveno</option>
              <option value="10">Décimo</option>
              <option value="11">Once</option>
            </select>
          </div>
        </div>
        <div class="col-md-2 text-center align-self-center">
          <button
            id="btn-reset-grade"
            class="btn btn-danger btn-block mt-3"
            style="display: none"
          >
            <i class="fa fa-exclamation-triangle"></i> Resetear Grado
          </button>
        </div>
        <div
          class="col-md-5"
          id="student-select-container"
          style="display: none"
        >
          <div class="form-group">
            <label for="student-select"
              ><strong>2. Seleccione Estudiante:</strong></label
            >
            <div class="input-group">
              <select id="student-select" class="form-control">
                <!-- Cargado vía JS -->
              </select>
              <div class="input-group-append">
                <button
                  class="btn btn-outline-primary"
                  type="button"
                  id="btn-refresh-results"
                >
                  <i class="fa fa-sync-alt mr-1"></i> Actualizar
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="user-results-container" class="mt-4" style="display: none">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">Historial de Exámenes y Reactivación</h5>
    </div>
    <div class="card-body p-0">
      <table id="user-results-table" class="table table-hover mb-0">
        <thead class="thead-light">
          <tr>
            <th>Área / Materia</th>
            <th>Último Puntaje</th>
            <th>Intento Actual</th>
            <th class="text-right">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <!-- Cargado vía JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="message-container" class="mt-3"></div>

<style>
  .btn-reset-attempts {
    background-color: #ffc107;
    color: #212529;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-reset-attempts:hover {
    background-color: #e0a800;
    transform: translateY(-1px);
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const gradeSelect = document.getElementById('grade-select');
    const studentSelectContainer = document.getElementById(
      'student-select-container'
    );
    const studentSelect = document.getElementById('student-select');
    const userResultsContainer = document.getElementById(
      'user-results-container'
    );
    const userResultsTableBody = document.querySelector(
      '#user-results-table tbody'
    );
    const messageContainer = document.getElementById('message-container');
    const btnRefresh = document.getElementById('btn-refresh-results');
    const btnResetGrade = document.getElementById('btn-reset-grade');

    function showMsg(msg, type) {
      messageContainer.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${msg}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>`;
    }

    // Refrescar resultados del estudiante actual
    btnRefresh.addEventListener('click', () => {
      if (studentSelect.value) {
        studentSelect.dispatchEvent(new Event('change'));
      }
    });

    // Resetear grado completo
    btnResetGrade.addEventListener('click', async () => {
      const grado = gradeSelect.value;
      if (!grado) return;

      if (
        confirm(
          `¡ATENCIÓN! ¿Está seguro de que desea eliminar TODOS los intentos de TODOS los estudiantes del grado ${grado}? Esta acción es irreversible.`
        )
      ) {
        try {
          const response = await fetch('/server-admin/reset_grade_attempts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ grado: grado }),
          });
          const data = await response.json();
          if (data.success) {
            showMsg(data.message, 'success');
            // Limpiar vista actual
            userResultsContainer.style.display = 'none';
            studentSelect.value = '';
          } else {
            showMsg(data.message, 'danger');
          }
        } catch (error) {
          showMsg('Error al procesar el reseteo masivo.', 'danger');
        }
      }
    });

    gradeSelect.addEventListener('change', async function () {
      const grado = this.value;
      if (!grado) {
        studentSelectContainer.style.display = 'none';
        userResultsContainer.style.display = 'none';
        btnResetGrade.style.display = 'none';
        return;
      }

      btnResetGrade.style.display = 'block'; // Mostrar botón rojo al elegir grado
      try {
        const response = await fetch(`/server-admin/users_by_grade/${grado}`);
        const data = await response.json();
        if (data.success) {
          studentSelect.innerHTML =
            '<option value="">Seleccione un estudiante</option>';
          data.users.forEach((u) => {
            const opt = document.createElement('option');
            opt.value = u.id;
            opt.textContent = `${u.codigo} - ${u.nombre_completo}`;
            studentSelect.appendChild(opt);
          });
          studentSelectContainer.style.display = 'block';
          userResultsContainer.style.display = 'none';
        }
      } catch (error) {
        showMsg('Error al cargar la lista de estudiantes.', 'danger');
      }
    });

    studentSelect.addEventListener('change', async function () {
      const userId = this.value;
      if (!userId) {
        userResultsContainer.style.display = 'none';
        return;
      }

      try {
        const response = await fetch(`/server-admin/user_results/${userId}`);
        const data = await response.json();
        if (data.success) {
          renderResults(data.results, userId);
          userResultsContainer.style.display = 'block';
        }
      } catch (error) {
        showMsg('Error al cargar los resultados del estudiante.', 'danger');
      }
    });

    function renderResults(results, userId) {
      userResultsTableBody.innerHTML = '';
      if (results.length === 0) {
        userResultsTableBody.innerHTML =
          "<tr><td colspan='4' class='text-center py-4 text-muted'>Este estudiante aún no ha realizado ningún examen.</td></tr>";
        return;
      }

      const latest = {};
      results.forEach((r) => {
        if (
          !latest[r.cuadernillo_id] ||
          r.attempt_number > latest[r.cuadernillo_id].attempt_number
        ) {
          latest[r.cuadernillo_id] = r;
        }
      });

      Object.values(latest).forEach((r) => {
        const row = userResultsTableBody.insertRow();
        row.innerHTML = `
                        <td class="align-middle font-weight-bold">${r.area}</td>
                        <td class="align-middle">${r.final_score.toFixed(
                          2
                        )} / 5.0</td>
                        <td class="align-middle text-primary font-weight-bold">Intento ${
                          r.attempt_number
                        }</td>
                        <td class="text-right">
                            <button class="btn-reset-attempts" data-user-id="${userId}" data-cuadernillo-id="${
                              r.cuadernillo_id
                            }">
                                <i class="fa fa-redo mr-1"></i> Reactivar Materia
                            </button>
                        </td>
                    `;
      });

      document.querySelectorAll('.btn-reset-attempts').forEach((btn) => {
        btn.addEventListener('click', handleReset);
      });
    }

    async function handleReset(e) {
      const userId = e.currentTarget.dataset.userId;
      const cuadernilloId = e.currentTarget.dataset.cuadernilloId;

      if (
        confirm(
          '¿Está seguro de que desea ELIMINAR todos los intentos de este estudiante para esta materia?'
        )
      ) {
        try {
          const response = await fetch('/server-admin/reset_exam_attempts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              user_id: userId,
              cuadernillo_id: cuadernilloId,
            }),
          });
          const data = await response.json();
          if (data.success) {
            showMsg(data.message, 'success');
            studentSelect.dispatchEvent(new Event('change'));
          } else {
            showMsg(data.message, 'danger');
          }
        } catch (error) {
          showMsg('Error al procesar la solicitud.', 'danger');
        }
      }
    }
  });
</script>
{% endblock %}
