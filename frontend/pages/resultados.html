<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Estudiantil IEM - Resultados</title>

    <link rel="stylesheet" href="../css/resultados.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="dashboard-body">
    <div class="dashboard-container">
      <!-- Header Dinámico -->
      <div id="header-placeholder"></div>

      <main class="dashboard-main">
        <!-- Hero Section (Sincronizado con Dashboard) -->
        <section class="hero-section">
          <div class="hero-card">
            <p class="hero-subtitle">
              ¡Excelente trabajo! <span id="heroUserName"></span>. Aquí están
              los resultados de tu prueba
            </p>
          </div>
        </section>

        <!-- Results Content Card -->
        <div class="results-card">
          <div class="results-header">
            <h2 id="examAreaTitle">Matemáticas</h2>
            <p>Resumen detallado de tu desempeño</p>
          </div>

          <div class="score-summary">
            <div class="score-main-display">
              <div class="score-circle">
                <svg viewBox="0 0 36 36" class="circular-chart">
                  <path
                    class="circle-bg"
                    d="M18 2.0845
                                      a 15.9155 15.9155 0 0 1 0 31.831
                                      a 15.9155 15.9155 0 0 1 0 -31.831"
                  />
                  <path
                    id="scoreRing"
                    class="circle"
                    stroke-dasharray="0, 100"
                    d="M18 2.0845
                                      a 15.9155 15.9155 0 0 1 0 31.831
                                      a 15.9155 15.9155 0 0 1 0 -31.831"
                  />
                  <text
                    x="18"
                    y="20.35"
                    class="percentage"
                    id="scorePercentage"
                  >
                    0%
                  </text>
                </svg>
              </div>
              <div class="grade-display">
                <span class="grade-label">Nota Final</span>
                <span id="bigScore" class="grade-value">0.0</span>
              </div>
            </div>
            <div class="score-status-container">
              <p id="scoreStatus" class="score-status">Calculando...</p>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon correct">
                <i class="fas fa-check-circle"></i>
              </div>
              <div class="stat-info">
                <span class="stat-label">Correctas</span>
                <span id="correctAnswers" class="stat-value">-</span>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon incorrect">
                <i class="fas fa-times-circle"></i>
              </div>
              <div class="stat-info">
                <span class="stat-label">Incorrectas</span>
                <span id="incorrectAnswers" class="stat-value">-</span>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon unselected">
                <i class="fas fa-minus-circle"></i>
              </div>
              <div class="stat-info">
                <span class="stat-label">Sin Marcar</span>
                <span id="unselectedAnswers" class="stat-value">-</span>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon time"><i class="fas fa-clock"></i></div>
              <div class="stat-info">
                <span class="stat-label">Tiempo</span>
                <span id="timeUsed" class="stat-value">-</span>
              </div>
            </div>
          </div>

          <div class="results-actions">
            <button id="retryExam" class="btn btn-secondary">
              <i class="fas fa-redo"></i> Volver a Intentar
            </button>
            <button id="viewAnswers" class="btn btn-secondary">
              <i class="fas fa-eye"></i> Ver respuestas
            </button>
            <button id="backToDashboard" class="btn btn-primary">
              <i class="fas fa-home"></i> Volver al Inicio
            </button>
          </div>
        </div>
      </main>

      <!-- Footer Dinámico -->
      <div id="footer-placeholder"></div>
    </div>

    <!-- Scripts -->
    <script>
      // Carga de fragmentos optimizada
      async function loadFragments() {
        try {
          const [headerRes, footerRes] = await Promise.all([
            fetch('header.html'),
            fetch('footer.html'),
          ]);

          if (headerRes.ok) {
            document.getElementById('header-placeholder').innerHTML =
              await headerRes.text();
          }
          if (footerRes.ok) {
            document.getElementById('footer-placeholder').innerHTML =
              await footerRes.text();
          }
        } catch (error) {
          console.error('Error cargando fragmentos:', error);
        }
      }
      loadFragments();
    </script>
    <script src="../js/main.js" defer></script>
    <script type="module" src="../js/pages/results.js"></script>
  </body>
</html>
