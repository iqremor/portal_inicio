<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Evaluación de Cuestionarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pink: {
                            50: '#fdf2f8', 100: '#fce7f3', 200: '#fbcfe8', 
                            300: '#f9a8d4', 400: '#f472b6', 500: '#ec4899', 
                            600: '#db2777', 700: '#be185d', 800: '#9d174d', 900: '#831843'
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-pink-50 to-purple-50 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8 no-print">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-3xl font-bold text-pink-800 flex items-center">
                    <i class="fas fa-file-alt mr-3"></i>
                    <span id="quiz-title">Matemáticas - Cuadernillo 1</span>
                </h1>
                <div class="flex space-x-4">
                    <button id="clear-answers-btn" 
                            class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg font-medium hover:bg-gray-300 transition-colors flex items-center">
                        <i class="fas fa-trash-alt mr-2"></i>
                        Limpiar respuestas
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-6">
            <h2 class="text-xl font-semibold text-pink-800 mb-4">Responder Cuestionario</h2>
            <p class="text-gray-600 mb-6">Seleccione una opción para cada pregunta y luego verifique sus resultados.</p>
            
            <div id="quiz-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
            
            <div class="mt-8 pt-6 border-t border-gray-200">
                <button id="show-results-btn"
                        class="px-6 py-3 bg-pink-600 text-white rounded-lg font-medium hover:bg-pink-700 transition-colors">
                    Ver Resultados
                </button>
                
                <div id="results-section" class="mt-6 p-6 bg-gradient-to-r from-pink-50 to-purple-50 rounded-lg border border-pink-200 hidden">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-4">
                        <h3 class="text-2xl font-bold text-pink-800">Resultados</h3>
                        <button id="print-btn"
                                class="mt-2 md:mt-0 px-4 py-2 bg-gray-700 text-white rounded-lg font-medium hover:bg-gray-800 flex items-center no-print">
                            <i class="fas fa-print mr-2"></i>
                            Imprimir Resultados
                        </button>
                    </div>
                    
                    <div id="results-summary" class="flex flex-wrap gap-4 mb-4">
                        </div>
                    
                    <div id="score-bar" class="mt-4 p-4 bg-white rounded-lg border border-gray-200 hidden">
                        <div class="flex items-center justify-between mb-2">
                            <span class="font-medium text-gray-700">Calificación:</span>
                            <span id="score-percentage" class="text-xl font-bold text-green-600">0%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2 mt-2">
                            <div id="score-progress" 
                                 class="h-2 rounded-full bg-green-500 transition-all duration-500" 
                                 style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-8 text-center text-gray-500 text-sm no-print">
            © 2025 Sistema de Evaluación de Cuestionarios
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
